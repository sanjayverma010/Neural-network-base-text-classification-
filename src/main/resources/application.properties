# application.properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.com.sentiment=DEBUG
logging.level.org.deeplearning4j=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application Configuration
app.name=Sentiment Analysis
app.version=1.0.0
app.description=Neural Network based Sentiment Analysis

# Model Configuration
model.hidden.layer1.size=128
model.hidden.layer2.size=64
model.learning.rate=0.001
model.training.epochs=100
model.dropout.rate=0.5

# Preprocessing Configuration
preprocessing.vocabulary.size=1000
preprocessing.use.tf=false

# CORS Configuration
cors.allowed.origins=*
cors.allowed.methods=GET,POST,PUT,DELETE